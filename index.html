<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --card: #0a0a0a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --dim: #555555;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      padding: 100px 24px;
      box-sizing: border-box;
    }

    /* RECHERCHE FIXE HAUT */
    .search-box {
      position: sticky;
      top: 30px;
      z-index: 100;
      margin-bottom: 60px;
    }

    input {
      width: 100%;
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 24px;
      color: var(--text);
      font-size: 13px;
      letter-spacing: 1px;
      outline: none;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    /* BENTO GRID */
    #app-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      height: 220px;
      position: relative; /* Pour le bouton fixe */
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .item:hover {
      background: #111;
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-8px);
    }

    /* CONTENU */
    .svg {
      width: 28px;
      height: 28px;
      stroke: var(--text);
      stroke-width: 1px;
      fill: none;
      margin-bottom: 15px;
    }

    .name {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .tag {
      font-size: 10px;
      color: var(--dim);
      font-family: monospace;
      margin-top: 5px;
      display: block;
    }

    /* BOUTON FIXÉ EN BAS À DROITE */
    .btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 18px;
      border: 1px solid var(--text);
      border-radius: 6px;
      transition: all 0.3s;
    }

    .item:hover .btn {
      background: var(--text);
      color: var(--bg);
    }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dim);
      padding-top: 100px;
    }

    @media (max-width: 600px) {
      .container { padding: 40px 20px; }
      #app-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="search-box">
    <input type="text" id="search" placeholder="RECHERCHER" onkeyup="filter()">
  </div>

  <main id="app-list">
    <div class="loading">INITIALISATION...</div>
  </main>

</div>

<script>
  const USER = "redappspro";
  const REPO = "store";

  async function getApps() {
    const container = document.getElementById('app-list');
    
    try {
      const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases`);
      const releases = await response.json();
      container.innerHTML = ''; 

      releases.forEach(release => {
        const asset = release.assets.find(a => a.name.endsWith('.apk'));
        if (asset) {
          const a = document.createElement('a');
          a.href = asset.browser_download_url;
          a.className = 'item';
          a.dataset.name = (release.name || asset.name).toLowerCase();

          a.innerHTML = `
            <svg class="svg" viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <div class="name">${release.name}</div>
            <span class="tag">${release.tag_name}</span>
            <div class="btn">Télécharger</div>
          `;
          container.appendChild(a);
        }
      });
    } catch (err) {
      container.innerHTML = '<div class="loading">ERREUR SERVEUR</div>';
    }
  }

  function filter() {
    let val = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.item').forEach(item => {
      item.style.display = item.dataset.name.includes(val) ? 'flex' : 'none';
    });
  }

  getApps();
</script>

</body>
</html>
