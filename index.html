<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APP STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --dim:#888;
}

body{
  margin:0;
  background:var(--bg);
  font-family:'Inter',sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.container{
  width:100%;
  max-width:700px;
  padding:80px 20px;
}

input{
  width:100%;
  padding:16px 20px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
  backdrop-filter:blur(20px);
  margin-bottom:40px;
  outline:none;
}

#app-list{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.item{
  width:100%;
  border-radius:24px;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  padding:20px;
  position:relative;
  overflow:hidden;
  transition:.4s cubic-bezier(.16,1,.3,1);
}

.item:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}

.top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.icon{
  width:44px;
  height:44px;
  border-radius:10px;
  object-fit:cover;
  background:#111;
}

.info{
  display:flex;
  flex-direction:column;
}

.name{
  font-size:18px;
  font-weight:600;
}

.tag{
  font-size:11px;
  color:var(--dim);
}

.desc{
  font-size:13px;
  color:#aaa;
  margin-top:10px;
  margin-bottom:40px;
}

.btn{
  position:absolute;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  font-size:11px;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<input id="search" placeholder="RECHERCHER" onkeyup="filter()">

<div id="app-list"></div>

</div>

<script>
const USER="redappspro";
const REPO="store";

/* -------- HELPERS -------- */

function extractImage(md){
  if(!md) return null;

  let match = md.match(/!\[.*?\]\((.*?)\)/);
  if(match) return fixUrl(match[1]);

  match = md.match(/<img[^>]+src="([^">]+)"/);
  if(match) return fixUrl(match[1]);

  return null;
}

function fixUrl(url){
  if(url.includes("github.com") && !url.includes("raw")){
    url += (url.includes("?") ? "&" : "?") + "raw=true";
  }
  return url;
}

function clean(md){
  return md
    ?.replace(/!\[.*?\]\(.*?\)/g,'')
    .replace(/<img[^>]*>/g,'')
    .replace(/[#>*-]/g,'')
    .replace(/\n/g,' ')
    .trim();
}

/* -------- LOAD -------- */

async function getApps(){
  const container=document.getElementById('app-list');

  const res=await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases`);
  let releases=await res.json();

  // ✅ TRI DU PLUS ANCIEN AU PLUS RÉCENT
  releases.sort((a,b)=>new Date(a.published_at)-new Date(b.published_at));

  releases.forEach(release=>{
    const asset=release.assets.find(a=>a.name.endsWith('.apk'));
    if(!asset) return;

    const img=extractImage(release.body);
    const desc=clean(release.body)?.substring(0,80)||"";

    const div=document.createElement('div');
    div.className='item';
    div.dataset.name=(release.name||'').toLowerCase();

    div.innerHTML=`
      <div class="top">
        ${img ? `<img class="icon" src="${img}">` : `<div class="icon"></div>`}

        <div class="info">
          <div class="name">${release.name}</div>
          <div class="tag">${release.tag_name}</div>
        </div>
      </div>

      ${desc ? `<div class="desc">${desc}</div>` : ''}

      <a class="btn" href="${asset.browser_download_url}" target="_blank">
        Télécharger
      </a>
    `;

    div.style.opacity=0;
    div.style.transform="translateY(20px)";
    setTimeout(()=>{
      div.style.transition="0.5s ease";
      div.style.opacity=1;
      div.style.transform="translateY(0)";
    },50);

    container.appendChild(div);
  });
}

/* -------- SEARCH -------- */

function filter(){
  const val=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.item').forEach(el=>{
    el.style.display=el.dataset.name.includes(val)?'block':'none';
  });
}

getApps();
</script>

</body>
</html>
