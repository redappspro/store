<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --accent: #00b4ff;
            --accent-dark: #0088cc;
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2e;
            --surface-glass: rgba(0, 180, 255, 0.08);
            --border-color: rgba(0, 180, 255, 0.15);
            --border-hover: rgba(0, 180, 255, 0.25);
            --text-primary: #ffffff;
            --text-secondary: #a0a9b8;
            --text-tertiary: #6b7280;
        }
        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: linear-gradient(135deg, #0a0e1a 0%, #141b2e 50%, #0d1219 100%);
            display: flex; justify-content: center; min-height: 100vh;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 25%, rgba(0, 180, 255, 0.15) 0%, transparent 45%);
            pointer-events: none; animation: pulse-glow 6s ease-in-out infinite;
        }
        .container { width: 100%; max-width: 720px; padding: 32px 16px 100px; position: relative; z-index: 1; }
        
        .header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 36px; 
            animation: fade-in 0.6s ease both; 
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo-icon { width: 52px; height: 52px; color: var(--accent); filter: drop-shadow(0 0 12px rgba(0, 180, 255, 0.4)); animation: float 3s ease-in-out infinite; }
        .header-title { font-size: 28px; font-weight: 700; font-family: 'Clash Display', sans-serif; }
        .header-subtitle { font-size: 11px; color: var(--text-tertiary); letter-spacing: 1.5px; text-transform: uppercase; }

        .btn-refresh {
            background: rgba(0, 180, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-refresh:hover {
            background: rgba(0, 180, 255, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 180, 255, 0.2);
            transform: translateY(-2px);
        }

        .search-box { 
            display: flex; align-items: center; 
            background: rgba(0, 180, 255, 0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border-color); 
            border-radius: 14px; padding: 12px 16px; margin-bottom: 32px; 
        }
        #search { flex: 1; background: transparent; border: none; color: white; outline: none; margin-left: 8px; font-size: 15px; }
        
        #app-list { display: flex; flex-direction: column; gap: 14px; }
        .item { 
            background: linear-gradient(135deg, rgba(0, 180, 255, 0.08) 0%, rgba(0, 180, 255, 0.03) 100%); 
            border: 1px solid var(--border-color); border-radius: 16px; padding: 18px; 
            transition: 0.3s; animation: fade-in 0.5s ease both;
        }
        .item:hover { transform: translateY(-3px); border-color: var(--border-hover); background: rgba(0, 180, 255, 0.12); }
        .top { display: flex; gap: 14px; align-items: flex-start; }
        .icon { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; background: #1a2536; border: 1px solid var(--border-color); }
        .info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .name { font-size: 16px; font-weight: 600; }
        .tag { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; }
        .desc { font-size: 13px; color: var(--text-secondary); margin-top: 8px; line-height: 1.5; }
        
        .btn { 
            background: linear-gradient(135deg, var(--accent), var(--accent-dark)); 
            color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; 
            font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; 
            gap: 6px; float: right; margin-top: 10px; text-transform: uppercase;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .no-results { text-align: center; padding: 48px; color: var(--text-secondary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <i data-lucide="download-cloud" class="logo-icon"></i>
            <div>
                <div class="header-title">APK STORE</div>
                <div class="header-subtitle">Téléchargez vos applications</div>
            </div>
        </div>
        
        <button class="btn-refresh" onclick="forceRefresh()">
            <i data-lucide="refresh-cw" size="16"></i>
            <span>Actualiser</span>
        </button>
    </div>

    <div class="search-box">
        <i data-lucide="search" size="18" style="color:var(--text-tertiary)"></i>
        <input type="text" id="search" placeholder="Rechercher une application...">
    </div>

    <div id="app-list"></div>
</div>

<script>
    const USER = "redappspro";
    const REPO = "store";
    const CACHE_KEY = "apk_store_data";
    const CACHE_TIME = 20 * 60 * 1000; // CACHE AUGMENTÉ À 20 MINUTES

    const fixUrl = url => (url.includes("github.com") && !url.includes("raw")) ? url + (url.includes("?") ? "&" : "?") + "raw=true" : url;
    
    const extractImage = md => {
        const match = md?.match(/!\[.*?\]\((.*?)\)/) || md?.match(/<img[^>]+src="([^">]+)"/);
        return match ? fixUrl(match[1]) : null;
    };

    const clean = md => md?.replace(/!\[.*?\]\(.*?\)/g,'').replace(/<img[^>]*>/g,'').replace(/[#>*-]/g,'').replace(/\n/g,' ').trim();

    async function forceRefresh() {
        const btn = document.querySelector('.btn-refresh');
        btn.style.opacity = "0.5";
        btn.querySelector('span').innerText = "Mise à jour...";
        localStorage.removeItem(CACHE_KEY);
        setTimeout(() => location.reload(), 500);
    }

    async function getApps() {
        const container = document.getElementById('app-list');
        const cached = localStorage.getItem(CACHE_KEY);

        if (cached) {
            const { timestamp, data } = JSON.parse(cached);
            render(data);
            if (Date.now() - timestamp < CACHE_TIME) return;
        }

        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases?t=${Date.now()}`);
            if (res.ok) {
                const releases = await res.json();
                localStorage.setItem(CACHE_KEY, JSON.stringify({ 
                    timestamp: Date.now(), 
                    data: releases 
                }));
                render(releases);
            }
        } catch (e) {
            if (!cached) container.innerHTML = '<div class="no-results">Erreur de connexion</div>';
        }
    }

    function render(releases) {
        const container = document.getElementById('app-list');
        container.innerHTML = '';
        releases.sort((a,b) => new Date(b.published_at) - new Date(a.published_at));

        let hasApps = false;
        releases.forEach((rel, i) => {
            const asset = rel.assets.find(a => a.name.endsWith('.apk'));
            if (!asset) return;
            hasApps = true;

            const img = extractImage(rel.body);
            const desc = clean(rel.body)?.substring(0, 85);

            const div = document.createElement('div');
            div.className = 'item';
            div.style.animationDelay = `${i * 0.05}s`;
            div.dataset.name = rel.name.toLowerCase();
            div.innerHTML = `
                <div class="top">
                    ${img ? `<img src="${img}" class="icon" onerror="this.style.display='none'">` : '<div class="icon"></div>'}
                    <div class="info">
                        <div class="name">${rel.name}</div>
                        <div class="tag">${rel.tag_name}</div>
                    </div>
                </div>
                ${desc ? `<div class="desc">${desc}...</div>` : ''}
                <a href="${asset.browser_download_url}" class="btn">
                    <i data-lucide="download" size="14"></i> Télécharger
                </a>
                <div style="clear:both"></div>
            `;
            container.appendChild(div);
        });

        if (!hasApps) container.innerHTML = '<div class="no-results">Aucune application trouvée.</div>';
        lucide.createIcons();
    }

    document.getElementById('search').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.item').forEach(el => {
            el.style.display = el.dataset.name.includes(val) ? 'block' : 'none';
        });
    });

    getApps();
</script>
</body>
</html>
