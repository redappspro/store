<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APK STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing: border-box;
}

:root{
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.10);
  --dim:#9aa0b0;
  --accent:#7c3aed;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:#000;
}

.container{
  width:100%;
  max-width:700px;
  padding:60px 20px 80px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-bottom:30px;
}

.logo{
  width:60px;
  filter:drop-shadow(0 0 8px rgba(124,58,237,0.3));
}

.logo-text{
  height:28px;
}

/* INPUT */
input{
  width:100%;
  padding:16px 18px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
  margin-bottom:40px;
  font-size:14px;
}

/* GLOBAL FOCUS */
:focus{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

/* LIST */
#app-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ITEM */
.item{
  width:100%;
  border-radius:18px;
  background:var(--card);
  border:1px solid var(--border);
  padding:18px;
  position:relative;
  transition:.2s ease;
}

.item:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(124,58,237,0.25);
  transform:translateY(-2px);
}

/* TOP */
.top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.icon{
  width:48px;
  height:48px;
  border-radius:12px;
  object-fit:cover;
  background:#111;
  border:1px solid var(--border);
}

.info{
  display:flex;
  flex-direction:column;
}

.name{
  font-size:17px;
  font-weight:600;
}

.tag{
  font-size:11px;
  color:var(--dim);
}

.desc{
  font-size:13px;
  color:#cbd5e1;
  margin-top:10px;
  margin-bottom:38px;
  line-height:1.4;
}

/* BUTTON */
.btn{
  position:absolute;
  bottom:18px;
  right:18px;
  background:linear-gradient(135deg, #7c3aed, #6d28d9);
  color:white;
  font-size:11px;
  padding:10px 16px;
  border-radius:10px;
  font-weight:600;
  text-decoration:none;
  transition:.2s ease;
  box-shadow:0 4px 15px rgba(124,58,237,0.3);
}

/* BUTTON STATES */
.btn:hover{
  transform:scale(1.05);
  opacity:0.95;
}

.btn:active{
  transform:scale(0.96);
}

.btn:focus{
  outline:2px solid white;
  outline-offset:2px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img class="logo"
    src="https://static.vecteezy.com/system/resources/previews/060/306/075/non_2x/google-play-store-apk-download-free-png.png">

  <svg class="logo-text" viewBox="0 0 300 60">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#6d28d9"/>
      </linearGradient>
    </defs>

    <text x="0" y="40" font-size="32" font-weight="700" fill="url(#grad)">
      APK STORE
    </text>
  </svg>
</div>

<input id="search" placeholder="RECHERCHER" onkeyup="filter()" autocomplete="off">

<div id="app-list"></div>

</div>

<script>
const USER="redappspro";
const REPO="store";

/* -------- HELPERS -------- */

function extractImage(md){
  if(!md) return null;

  let match = md.match(/!\[.*?\]\((.*?)\)/);
  if(match) return fixUrl(match[1]);

  match = md.match(/<img[^>]+src="([^">]+)"/);
  if(match) return fixUrl(match[1]);

  return null;
}

function fixUrl(url){
  if(url.includes("github.com") && !url.includes("raw")){
    url += (url.includes("?") ? "&" : "?") + "raw=true";
  }
  return url;
}

function clean(md){
  return md
    ?.replace(/!\[.*?\]\(.*?\)/g,'')
    .replace(/<img[^>]*>/g,'')
    .replace(/[#>*-]/g,'')
    .replace(/\n/g,' ')
    .trim();
}

/* -------- LOAD -------- */

async function getApps(){
  const container=document.getElementById('app-list');

  const res=await fetch(`https://api.github.com/repos/${USER}/${REPO}/releases`);
  let releases=await res.json();

  releases.sort((a,b)=>new Date(a.published_at)-new Date(b.published_at));

  releases.forEach(release=>{
    const asset=release.assets.find(a=>a.name.endsWith('.apk'));
    if(!asset) return;

    const img=extractImage(release.body);
    const desc=clean(release.body)?.substring(0,80)||"";

    const div=document.createElement('div');
    div.className='item';
    div.tabIndex=0;
    div.dataset.name=(release.name||'').toLowerCase();

    div.innerHTML=`
      <div class="top">
        ${img ? `<img class="icon" src="${img}">` : `<div class="icon"></div>`}

        <div class="info">
          <div class="name">${release.name}</div>
          <div class="tag">${release.tag_name}</div>
        </div>
      </div>

      ${desc ? `<div class="desc">${desc}</div>` : ''}

      <a class="btn" href="${asset.browser_download_url}" target="_blank" tabindex="0" aria-label="Télécharger l'application">
        Télécharger
      </a>
    `;

    container.appendChild(div);
  });
}

/* -------- SEARCH -------- */

function filter(){
  const val=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.item').forEach(el=>{
    el.style.display=el.dataset.name.includes(val)?'block':'none';
  });
}

/* -------- TV / KEYBOARD NAV -------- */

document.addEventListener("keydown", (e) => {
  const focusable = Array.from(document.querySelectorAll('input, .item, .btn'));
  const index = focusable.indexOf(document.activeElement);

  if(e.key === "ArrowDown"){
    e.preventDefault();
    const next = focusable[index + 1] || focusable[0];
    next.focus();
    next.scrollIntoView({behavior:"smooth", block:"center"});
  }

  if(e.key === "ArrowUp"){
    e.preventDefault();
    const prev = focusable[index - 1] || focusable[focusable.length - 1];
    prev.focus();
    prev.scrollIntoView({behavior:"smooth", block:"center"});
  }

  if(e.key === "Enter"){
    if(document.activeElement.classList.contains("btn")){
      document.activeElement.click();
    }
  }
});

getApps();
</script>

</body>
</html>
